<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Interactive Brain Map Viewer</title>

  <!-- Papaya CSS & JS -->
  <link rel="stylesheet" type="text/css"
        href="https://rii-mango.github.io/Papaya/release/current/standard/papaya.css">
  <script type="text/javascript"
          src="https://rii-mango.github.io/Papaya/release/current/standard/papaya.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffffff;
      color: #333;
      padding: 20px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    p.subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 16px;
    }

    /* Map selector buttons */
    .map-selector {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .map-btn {
      padding: 9px 18px;
      cursor: pointer;
      border: 2px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #555;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .map-btn:hover {
      border-color: #2196F3;
      color: #2196F3;
    }

    .map-btn.active {
      background: #2196F3;
      border-color: #2196F3;
      color: #fff;
    }

    /* Papaya container */
    .papaya {
      margin: 0 auto;
    }

    /* Loading overlay */
    #loading {
      display: none;
      margin: 12px auto;
      font-size: 14px;
      color: #2196F3;
    }

    #loading.visible {
      display: block;
    }

    footer {
      margin-top: 20px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h2>Voxel-wise Brain Volume Alterations</h2>
  <p class="subtitle">Select a contrast to view the statistical map</p>

  <!-- Map selector -->
  <div class="map-selector">
    <button class="map-btn active" onclick="switchMap(0, this)">FEP vs HC &mdash; GMV</button>
    <button class="map-btn"        onclick="switchMap(1, this)">FEP vs HC &mdash; WMV</button>
    <button class="map-btn"        onclick="switchMap(2, this)">SCZ vs HC &mdash; GMV</button>
    <button class="map-btn"        onclick="switchMap(3, this)">SCZ vs HC &mdash; WMV</button>
  </div>

  <div id="loading">Loading image&hellip;</div>

  <!-- Papaya viewer (will be rebuilt on each map switch) -->
  <div id="viewer-container">
    <div class="papaya" id="papaya-viewer" data-params="params"></div>
  </div>

  <footer>
    Powered by <a href="https://github.com/rii-mango/Papaya" target="_blank">Papaya Viewer</a>
    &nbsp;|&nbsp; Click and drag to navigate slices &middot; Scroll to change slice
  </footer>

  <script type="text/javascript">
    // -- Available statistical overlays (same directory as this HTML) --
    var STAT_MAPS = [
      "FEP_vs_HC_GMV.nii.gz",
      "FEP_vs_HC_WMV.nii.gz",
      "SCZ_vs_HC_GMV.nii.gz",
      "SCZ_vs_HC_WMV.nii.gz"
    ];

    var BASE_IMAGE = "ch256.nii.gz";   // Use gzipped version for faster loading
    var currentIndex = 0;

    // -- Default Papaya params (loaded on page init) --
    var params = [];
    params["images"]     = [BASE_IMAGE, STAT_MAPS[0]];
    params["worldSpace"] = true;
    params["luts"]       = [["Gray", "Red Overlay"]];
    params[STAT_MAPS[0]] = { min: 2, max: 6, lut: "Red Overlay" };

    // -- Switch to a different statistical map --
    function switchMap(index, btnElement) {
      if (index === currentIndex) return;
      currentIndex = index;

      // Update button styles
      var buttons = document.querySelectorAll(".map-btn");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
      }
      btnElement.classList.add("active");

      // Show loading indicator
      document.getElementById("loading").classList.add("visible");

      // Remove old viewer
      var container = document.getElementById("viewer-container");
      container.innerHTML = "";

      // Build new params
      var newParams = [];
      newParams["images"]          = [BASE_IMAGE, STAT_MAPS[index]];
      newParams["worldSpace"]      = true;
      newParams["luts"]            = [["Gray", "Red Overlay"]];
      newParams[STAT_MAPS[index]]  = { min: 2, max: 6, lut: "Red Overlay" };

      // Create fresh Papaya div
      var div = document.createElement("div");
      div.className = "papaya";
      div.setAttribute("data-params", "newParams");
      container.appendChild(div);

      // Expose newParams globally so Papaya can find it
      window.newParams = newParams;

      // Re-initialise Papaya
      papaya.Container.resetViewer(0, newParams);

      // Hide loading indicator after a short delay
      setTimeout(function () {
        document.getElementById("loading").classList.remove("visible");
      }, 500);
    }
  </script>

</body>
</html>
